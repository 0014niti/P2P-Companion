<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="100" cy="100" r="100" fill="url(#grad1)" />

  <!-- Two connected nodes for P2P -->
  <g stroke="white" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- Left node -->
    <circle cx="60" cy="100" r="20" fill="white" opacity="0.95" />
    <circle cx="60" cy="100" r="12" fill="url(#grad1)" />

    <!-- Right node -->
    <circle cx="140" cy="100" r="20" fill="white" opacity="0.95" />
    <circle cx="140" cy="100" r="12" fill="url(#grad1)" />

    <!-- Connection line with dots -->
    <line x1="80" y1="100" x2="120" y2="100" stroke="white" stroke-width="2" />
    <circle cx="100" cy="100" r="3" fill="white" />
  </g>

  <!-- Arrow indicators for bidirectional flow -->
  <g fill="white" opacity="0.8">
    <!-- Left arrow -->
    <polygon points="75,95 85,100 75,105" />
    <!-- Right arrow -->
    <polygon points="125,95 115,100 125,105" />
  </g>

  <!-- Decorative accents -->
  <g fill="white" opacity="0.6">
    <circle cx="55" cy="65" r="3" />
    <circle cx="145" cy="65" r="3" />
    <circle cx="55" cy="135" r="3" />
    <circle cx="145" cy="135" r="3" />
  </g>
</svg>